<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Sjekkliste">
<meta name="theme-color" content="#1a2744">
<title>NKF-1005 Sjekkliste</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#222}
.hdr{background:#1a2744;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99}
.hdr h1{font-size:15px;font-weight:600}
.hdr p{font-size:11px;opacity:.6}
.hdr-r{display:flex;gap:8px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:#4ade80}
.dot.err{background:#f87171}
.btn{padding:6px 12px;border:1px solid rgba(255,255,255,.3);border-radius:6px;background:rgba(255,255,255,.1);color:#fff;font-size:12px;cursor:pointer}
.btn:hover{background:rgba(255,255,255,.2)}
.layout{display:flex;height:calc(100vh - 48px)}
.sidebar{width:240px;background:#fff;border-right:1px solid #e0e0e0;overflow-y:auto;flex-shrink:0}
.main{flex:1;overflow-y:auto;padding:16px}
.s-search{padding:8px;border-bottom:1px solid #eee}
.s-search input{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px}
.s-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.s-item:hover{background:#f5f7ff}
.s-item.active{background:#eff3ff;border-left:3px solid #2d5be3}
.s-name{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-item.active .s-name{color:#2d5be3}
.badge{font-size:10px;padding:2px 6px;border-radius:10px;font-weight:500}
.bd{background:#dcfce7;color:#166534}
.bp{background:#fef9c3;color:#854d0e}
.bn{background:#f0f0f0;color:#888}
/* Dashboard */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:14px}
.stat-l{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.stat-v{font-size:24px;font-weight:600;color:#1a2744}
.stat-s{font-size:11px;color:#888;margin-top:2px}
.prog-wrap{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:14px;margin-bottom:16px}
.prog-top{display:flex;justify-content:space-between;font-size:13px;font-weight:500;margin-bottom:8px}
.track{height:10px;background:#f0f0f0;border-radius:5px;overflow:hidden}
.fill{height:100%;background:#2d5be3;border-radius:5px;transition:width .3s}
.tbl-wrap{background:#fff;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden}
.tbl-hdr{padding:12px 16px;font-weight:600;font-size:13px;border-bottom:1px solid #eee}
table.dtbl{width:100%;border-collapse:collapse;font-size:12px}
table.dtbl th{background:#f8f8f8;padding:8px 12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#666;border-bottom:1px solid #e0e0e0}
table.dtbl td{padding:9px 12px;border-bottom:1px solid #f0f0f0}
table.dtbl tr{cursor:pointer}
table.dtbl tr:hover td{background:#f5f7ff}
.mini{display:flex;align-items:center;gap:6px}
.mini-t{flex:1;height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden;min-width:50px}
.mini-f{height:100%;border-radius:3px;background:#2d5be3}
.mini-f.done{background:#2d7a4f}
.chip{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:500}
.chip-done{background:#dcfce7;color:#166534}
.chip-prog{background:#fef9c3;color:#854d0e}
.chip-none{background:#f0f0f0;color:#888}
/* Checklist */
.cl-hdr{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:14px;margin-bottom:12px}
.cl-title{font-size:18px;font-weight:600;color:#1a2744;margin-bottom:10px}
.meta-g{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mf label{font-size:10px;font-weight:600;text-transform:uppercase;color:#888;display:block;margin-bottom:3px}
.mf input{width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#f8f8f8}
.mf input:focus{outline:none;border-color:#2d5be3;background:#fff}
.prog-row{display:flex;align-items:center;gap:10px}
.prog-row .track{flex:1;height:7px}
.pct-lbl{font-size:13px;font-weight:600;color:#2d5be3;min-width:36px}
.cnt-lbl{font-size:11px;color:#888}
.acts{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.act-btn{padding:6px 12px;border:1px solid #ddd;border-radius:6px;font-size:12px;cursor:pointer;background:#fff;color:#333}
.act-btn:hover{background:#f5f5f5}
.act-btn.primary{background:#2d5be3;color:#fff;border-color:#2d5be3}
.ct-wrap{background:#fff;border:1px solid #e0e0e0;border-radius:8px;overflow:auto}
table.ct{width:100%;border-collapse:collapse;font-size:12px}
table.ct th{background:#1a2744;color:#fff;padding:9px 8px;text-align:left;font-weight:400;font-size:11px}
table.ct td{padding:7px 8px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
table.ct tr.r-done td{background:#f0fdf4}
table.ct tr.r-av td{background:#fff5f5}
.rn{font-size:10px;color:#aaa;text-align:center;width:24px}
.ti{width:100%;padding:4px 6px;border:1px solid #ddd;border-radius:4px;font-size:11px;background:transparent}
.ti:focus{outline:none;border-color:#2d5be3}
.av-btns{display:flex;gap:3px}
.av{padding:4px 8px;border-radius:4px;border:1px solid #ddd;font-size:11px;cursor:pointer;background:#fff}
.av.ja.on{background:#ffe0e0;border-color:#e74c3c;color:#c0392b;font-weight:600}
.av.nei.on{background:#dcfce7;border-color:#2d7a4f;color:#166534;font-weight:600}
.sign-w{display:flex;flex-direction:column;gap:2px}
.dato{font-size:9px;color:#aaa}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a2744;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:640px){
  .sidebar{display:none}
  .stats{grid-template-columns:1fr 1fr}
  .layout{height:calc(100vh - 48px)}
}
</style>
</head>

function getStats(n) {
  const s = state[n];
  const tot = ITEMS.length;
  const av = s.rows.filter(r => r.avvik !== null).length;
  const sg = s.rows.filter(r => r.sign && r.sign.trim()).length;
  const done = av === tot && sg === tot;
  return {tot, av, sg, done, pct: Math.round((sg/tot)*100)};
}

function getOverall() {
  let done=0, sg=0, tot=0;
  SHEETS.forEach(s => { const st=getStats(s); if(st.done)done++; sg+=st.sg; tot+=st.tot; });
  return {done, sg, tot, pct:Math.round((done/SHEETS.length)*100), ark:SHEETS.length};
}

function buildSidebar(q) {
  q = (q||'').toLowerCase();
  document.getElementById('sList').innerHTML = SHEETS
    .filter(n => n.toLowerCase().includes(q))
    .map(n => {
      const st = getStats(n);
      const badge = st.done ? '<span class="badge bd">&#x2713;</span>' : st.pct > 0 ? '<span class="badge bp">'+st.pct+'%</span>' : '<span class="badge bn">&mdash;</span>';
      const cls = current===n ? ' active' : '';
      const idx = SHEETS.indexOf(n);
      return '<div class="s-item'+cls+'" onclick="openSheet('+idx+')"><span class="s-name">'+n+'</span>'+badge+'</div>';
    }).join('');
}

function filterSidebar(q) { buildSidebar(q); }

function showDash() {
  current = null;
  buildSidebar();
  const ov = getOverall();
  const rows = SHEETS.map(n => {
    const st = getStats(n);
    const sn = (state[n].meta.serie_nr||'').trim();
    const snH = sn ? `<span style="font-size:11px;color:#888">${sn.substring(0,20)}</span>` : `<span style="color:#e74c3c;font-size:11px;font-weight:500">Mangler</span>`;
    const chip = st.done ? `<span class="chip chip-done">✓ Fullført</span>` : st.pct>0 ? `<span class="chip chip-prog">Påbegynt</span>` : `<span class="chip chip-none">—</span>`;
    const fc = st.done ? ' done' : '';
    const sidx = SHEETS.indexOf(n);
      return `<tr onclick="openSheet(${sidx})">
      <td style="font-weight:500">${n}</td>
      <td>${snH}</td>
      <td>${chip}</td>
      <td><div class="mini"><div class="mini-t"><div class="mini-f${fc}" style="width:${st.pct}%"></div></div><span style="font-size:10px;color:#888;min-width:28px">${st.pct}%</span></div></td>
      <td style="color:#888;font-size:11px">${st.sg}/${st.tot}</td>
    </tr>`;
  }).join('');

  const d = new Date();
  const ds = d.toLocaleDateString('no-NO')+' '+d.toLocaleTimeString('no-NO',{hour:'2-digit',minute:'2-digit'});

  document.getElementById('main').innerHTML = `
    <div class="stats">
      <div class="stat"><div class="stat-l">Total fremgang</div><div class="stat-v">${ov.pct}%</div><div class="stat-s">${ov.done} av ${ov.ark} fullført</div></div>
      <div class="stat"><div class="stat-l">Ark fullført</div><div class="stat-v">${ov.done}</div><div class="stat-s">av ${ov.ark}</div></div>
      <div class="stat"><div class="stat-l">Signaturer</div><div class="stat-v">${ov.sg}</div><div class="stat-s">av ${ov.tot} rader</div></div>
      <div class="stat"><div class="stat-l">Gjenstående</div><div class="stat-v">${ov.ark-ov.done}</div><div class="stat-s">ark</div></div>
    </div>
    <div class="prog-wrap">
      <div class="prog-top"><span>Samlet fremgang</span><span style="color:#2d5be3">${ov.pct}%</span></div>
      <div class="track"><div class="fill" style="width:${ov.pct}%"></div></div>
    </div>
    <div class="tbl-wrap">
      <div class="tbl-hdr">Alle sjekklister · ${ds}</div>
      <div style="overflow-x:auto">
        <table class="dtbl"><thead><tr><th>Ark</th><th>Serie nr.</th><th>Status</th><th>Fremgang</th><th>Sign.</th></tr></thead>
        <tbody>${rows}</tbody></table>
      </div>
    </div>`;
}

function openSheet(idx) { open_(SHEETS[idx]); }
function open_(n) {
  current = n;
  buildSidebar();
  renderSheet(n);
  document.getElementById('main').scrollTop = 0;
}

function buildChangelog(n) {
  const hasLog = state[n].rows.some(r => r.changelog && r.changelog.length > 0);
  if (!hasLog) return '';
  let rows = '';
  state[n].rows.forEach((r, i) => {
    if (r.changelog && r.changelog.length > 0) {
      r.changelog.forEach(log => {
        const fraColor = log.fra === 'ja' ? '#ffe0e0' : log.fra === 'nei' ? '#dcfce7' : '#f0f0f0';
        const tilColor = log.til === 'ja' ? '#ffe0e0' : log.til === 'nei' ? '#dcfce7' : '#f0f0f0';
        rows += '<tr style="border-bottom:1px solid #f0f0f0">' +
          '<td style="padding:6px 8px;color:#aaa;font-size:10px;text-align:center">' + (i+1) + '</td>' +
          '<td style="padding:6px 8px;font-weight:500;font-size:12px">' + ITEMS[i].element + '</td>' +
          '<td style="padding:6px 8px;font-size:11px;color:#666">' + ITEMS[i].metode + '</td>' +
          '<td style="padding:6px 8px;text-align:center"><span style="background:' + fraColor + ';padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500">' + (log.fra||'—') + '</span></td>' +
          '<td style="padding:6px 8px;text-align:center;color:#888">→</td>' +
          '<td style="padding:6px 8px;text-align:center"><span style="background:' + tilColor + ';padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500">' + log.til + '</span></td>' +
          '<td style="padding:6px 8px;font-size:12px">' + log.kommentar + '</td>' +
          '<td style="padding:6px 8px;font-size:11px;font-weight:500">' + log.sign + '</td>' +
          '<td style="padding:6px 8px;font-size:10px;color:#888;white-space:nowrap">' + log.tid + '</td>' +
        '</tr>';
      });
    }
  });
  if (!rows) return '';
  return '<div style="margin-top:20px;background:#fff;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden">' +
    '<div style="padding:12px 16px;font-weight:600;font-size:13px;border-bottom:1px solid #eee;background:#f8f8f8;color:#1a2744">&#9998; Changelog — Endringslogg</div>' +
    '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">' +
    '<thead><tr style="background:#f8f8f8">' +
    '<th style="padding:7px 8px;text-align:center;font-size:10px;text-transform:uppercase;color:#888;border-bottom:1px solid #eee">#</th>' +
    '<th style="padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase;color:#888;border-bottom:1px solid #eee">Element</th>' +
    '<th style="padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase;color:#888;border-bottom:1px solid #eee">Metode</th>' +
    '<th style="padding:7px 8px;text-align:center;font-size:10px;text-transform:uppercase;color:#888;border-bottom:1px solid #eee">Fra</th>' +
    '<th style="padding:7px 8px;border-bottom:1px solid #eee"></th>' +
    '<th style="padding:7px 8px;text-align:center;font-size:10px;text-transform:uppercase;color:#888;border-bottom:1px solid #eee">Til</th>' +
    '<th style="padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase;color:#888;border-bottom:1px solid #eee">Kommentar</th>' +
    '<th style="padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase;color:#888;border-bottom:1px solid #eee">Signert av</th>' +
    '<th style="padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase;color:#888;border-bottom:1px solid #eee">Tidspunkt</th>' +
    '</tr></thead>' +
    '<tbody>' + rows + '</tbody></table></div></div>';
}


function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function updMeta(idx,f,v){ state[SHEETS[idx]].meta[f]=v; save(); }
function upd(idx,i,f,v){ state[SHEETS[idx]].rows[i][f]=v; save(); }
function togNA(idx,i,val){
  const n=SHEETS[idx];
  state[n].rows[i].na=val;
  if(val) state[n].rows[i].maal='';
  save(); renderSheet(n); buildSidebar();
}
function tog(idx,i,v){
  const n=SHEETS[idx];
  const prev = state[n].rows[i].avvik;
  // If changing from 'ja' to 'nei', require changelog comment
  if (prev === 'ja' && v === 'nei') {
    showChangelogDialog(idx, i, v);
    return;
  }
  state[n].rows[i].avvik = state[n].rows[i].avvik===v ? null : v;
  save(); renderSheet(n); buildSidebar();
}

function showChangelogDialog(idx, i, newVal) {
  // Store pending change globally
  window._pendingChange = {idx, i, newVal};
  const item = ITEMS[i];
  const n = SHEETS[idx];
  const prev = state[n].rows[i].avvik;

  const overlay = document.createElement('div');
  overlay.id = 'cl-modal';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px';

  const fraLabel = prev === 'ja' ? 'Ja' : prev === 'nei' ? 'Nei' : '—';
  const tilLabel = newVal === 'ja' ? 'Ja' : 'Nei';
  const now = new Date().toLocaleString('no-NO');

  overlay.innerHTML = 
    '<div style="background:#fff;border-radius:10px;padding:24px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.2)">' +
    '<h3 style="font-size:15px;font-weight:600;color:#1a2744;margin-bottom:4px">Endre avvik</h3>' +
    '<p style="font-size:12px;color:#888;margin-bottom:12px">' + item.element + ' — ' + item.metode + '</p>' +
    '<p style="font-size:12px;color:#666;margin-bottom:12px">Endring: <b>' + fraLabel + '</b> → <b>' + tilLabel + '</b></p>' +
    '<label style="font-size:10px;font-weight:600;text-transform:uppercase;color:#888;display:block;margin-bottom:4px">Kommentar (påkrevd)</label>' +
    '<textarea id="cl-comment" placeholder="Begrunn endringen..." style="width:100%;height:80px;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;resize:vertical;margin-bottom:12px;display:block"></textarea>' +
    '<label style="font-size:10px;font-weight:600;text-transform:uppercase;color:#888;display:block;margin-bottom:4px">Signatur (påkrevd)</label>' +
    '<input id="cl-sign" type="text" placeholder="Ditt navn" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:6px;display:block">' +
    '<div style="font-size:10px;color:#aaa;margin-bottom:16px">' + now + '</div>' +
    '<div style="display:flex;gap:8px;justify-content:flex-end">' +
    '<button onclick="closeChangelogDialog()" style="padding:8px 16px;border:1px solid #ddd;border-radius:6px;background:#fff;font-size:13px;cursor:pointer">Avbryt</button>' +
    '<button onclick="confirmChangelog()" style="padding:8px 16px;border:none;border-radius:6px;background:#2d5be3;color:#fff;font-size:13px;font-weight:500;cursor:pointer">Bekreft endring</button>' +
    '</div></div>';

  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('cl-comment').focus(), 100);
}

function closeChangelogDialog() {
  const el = document.getElementById('cl-modal');
  if (el) el.remove();
}

function confirmChangelog() {
  const {idx, i, newVal} = window._pendingChange || {};
  if (idx === undefined) return;
  const comment = document.getElementById('cl-comment').value.trim();
  const sign = document.getElementById('cl-sign').value.trim();
  if (!comment) { 
    document.getElementById('cl-comment').style.borderColor = '#e74c3c';
    document.getElementById('cl-comment').placeholder = 'Kommentar er påkrevd!';
    return; 
  }
  if (!sign) {
    document.getElementById('cl-sign').style.borderColor = '#e74c3c';
    document.getElementById('cl-sign').placeholder = 'Signatur er påkrevd!';
    return;
  }
  const n = SHEETS[idx];
  const prev = state[n].rows[i].avvik;
  if (!state[n].rows[i].changelog) state[n].rows[i].changelog = [];
  state[n].rows[i].changelog.push({
    fra: prev,
    til: newVal,
    kommentar: comment,
    sign: sign,
    tid: new Date().toLocaleString('no-NO')
  });
  state[n].rows[i].avvik = newVal;
  closeChangelogDialog();
  save();
  renderSheet(n);
  buildSidebar();
  toast('Endring registrert i changelog');
}
function sign_(idx,i,v){ const n=SHEETS[idx];
  state[n].rows[i].sign=v;
  if(v.trim()){
    state[n].rows[i].dato=new Date().toLocaleDateString('no-NO');
    state[n].rows[i].signBy=user;
  } else {
    state[n].rows[i].dato='';
    state[n].rows[i].signBy='';
  }
  save(); renderSheet(n); buildSidebar();
}

function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const json = JSON.stringify(state);
    try { localStorage.setItem(LS_KEY, json); } catch(e){}
    try {
      const r = await fetch(WORKER, {method:'POST', headers:{'Content-Type':'application/json'}, body:json});
      setDot(r.ok ? 'ok' : 'err');
    } catch(e){ setDot('err'); }
  }, 800);
}

function setDot(s){ document.getElementById('dot').className = 'dot'+(s==='err'?' err':''); }

function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

function start(){
  try {
    const local = localStorage.getItem(LS_KEY);
    if(local) state = JSON.parse(local);
  } catch(e){}
  initState();
  buildSidebar();
  showDash();
  // Sync cloud in background
  fetch(WORKER, {method:'GET'})
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if(data && Object.keys(data).length > 0){
        state = data;
        initState();
        buildSidebar();
        if(!current) showDash(); else renderSheet(current);
        setDot('ok');
        toast('Synkronisert fra sky');
      } else { setDot('ok'); }
    })
    .catch(() => setDot('err'));
}

start();
