<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="MC Sjekkliste">
<meta name="theme-color" content="#1a2744">
<title>NKF-1005 Skyberg — MC Sjekklister</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#222;min-height:100vh}
/* HEADER */
.hdr{background:#1a2744;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;gap:8px}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr h1{font-size:14px;font-weight:600}
.hdr p{font-size:11px;opacity:.6}
.hdr-right{display:flex;gap:6px;align-items:center;flex-shrink:0}
.dot{width:8px;height:8px;border-radius:50%;background:#4ade80;flex-shrink:0}
.dot.err{background:#f87171}
.dot.syncing{background:#facc15;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{padding:6px 12px;border:1px solid rgba(255,255,255,.25);border-radius:6px;background:rgba(255,255,255,.1);color:#fff;font-size:12px;cursor:pointer;white-space:nowrap}
.btn:hover{background:rgba(255,255,255,.2)}
.btn-primary{background:#2d5be3;border-color:#2d5be3}
/* LAYOUT */
.layout{display:flex;height:calc(100vh - 50px)}
.sidebar{width:240px;background:#fff;border-right:1px solid #e0e0e0;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px}
/* SIDEBAR */
.s-search{padding:8px;border-bottom:1px solid #eee;flex-shrink:0}
.s-search input{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px}
.s-list{overflow-y:auto;flex:1}
.s-group-hdr{padding:6px 12px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#fff;position:sticky;top:0;z-index:1}
.s-group-hdr.kv420{background:#1a4a8a}
.s-group-hdr.kv132{background:#1a6b3a}
.s-group-hdr.felles{background:#5a4a8a}
.s-group-hdr{cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between}
.s-group-hdr .collapse-arrow{font-size:10px;transition:transform .2s}
.s-group-hdr.collapsed .collapse-arrow{transform:rotate(-90deg)}
.s-group-items.hidden{display:none}
.s-mc{padding:7px 12px 7px 16px;cursor:pointer;border-bottom:1px solid #f5f5f5;display:flex;align-items:center;justify-content:space-between;gap:6px}
.s-mc:hover{background:#f8f9ff}
.s-mc.active{background:#eff3ff;border-left:3px solid #2d5be3}
.s-mc.placeholder{opacity:.5;cursor:default}
.s-mc-name{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-mc.active .s-mc-name{color:#2d5be3}
.s-badge{font-size:10px;padding:2px 5px;border-radius:8px;font-weight:500;flex-shrink:0}
.bd{background:#dcfce7;color:#166534}
.bp{background:#fef9c3;color:#854d0e}
.bn{background:#f0f0f0;color:#888}
.bph{background:#f0f0f0;color:#aaa}
/* MAIN DASHBOARD */
.dash{padding:16px}
.dash-title{font-size:20px;font-weight:700;color:#1a2744;margin-bottom:2px}
.dash-sub{font-size:12px;color:#888;margin-bottom:16px}
/* Overall stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:14px}
.stat-l{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.stat-v{font-size:24px;font-weight:700;color:#1a2744}
.stat-s{font-size:11px;color:#888;margin-top:2px}
.prog-card{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:14px;margin-bottom:16px}
.prog-top{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:8px;color:#1a2744}
.prog-pct{color:#2d5be3}
.track{height:10px;background:#f0f0f0;border-radius:5px;overflow:hidden}
.fill{height:100%;background:#2d5be3;border-radius:5px;transition:width .3s}
/* Category sections */
.cat-section{margin-bottom:20px}
.cat-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;margin-bottom:10px;color:#fff}
.cat-hdr.kv420{background:linear-gradient(135deg,#1a2744,#1a4a8a)}
.cat-hdr.kv132{background:linear-gradient(135deg,#1a3a24,#1a6b3a)}
.cat-hdr.felles{background:linear-gradient(135deg,#2a1a44,#5a4a8a)}
.cat-hdr h2{font-size:15px;font-weight:700}
.cat-hdr .cat-pct{margin-left:auto;font-size:13px;font-weight:600;opacity:.9}
/* MC cards grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.mc-card{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.mc-card:hover{border-color:#2d5be3;transform:translateY(-1px);box-shadow:0 4px 12px rgba(45,91,227,.15)}
.mc-card:active{transform:none}
.mc-card.done{border-color:#2d7a4f;background:#f0fdf4}
.mc-card.active-card{border-color:#2d5be3;background:#eff3ff}
.mc-card.placeholder-card{opacity:.6;cursor:default;background:#fafafa}
.mc-card.placeholder-card:hover{transform:none;box-shadow:none;border-color:#e0e0e0}
.mc-card-nr{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.mc-card-name{font-size:13px;font-weight:600;color:#1a2744;margin-bottom:8px;line-height:1.3}
.mc-card.done .mc-card-name{color:#1a4a2a}
.mc-card.placeholder-card .mc-card-name{color:#888}
.mc-prog-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.mc-prog-row .track{flex:1;height:5px}
.mc-pct{font-size:11px;font-weight:600;color:#2d5be3;min-width:28px}
.mc-pct.done-pct{color:#2d7a4f}
.mc-stats{display:flex;gap:8px;font-size:10px;color:#888}
.mc-stats span{display:flex;align-items:center;gap:3px}
.placeholder-badge{display:inline-block;background:#f0f0f0;color:#888;font-size:10px;padding:3px 8px;border-radius:10px;font-weight:500}
/* CHECKLIST VIEW */
.cl{padding:14px}
.cl-hdr{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:14px;margin-bottom:10px}
.cl-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.cl-title{font-size:17px;font-weight:700;color:#1a2744}
.cl-nr{font-size:11px;color:#888;font-weight:500}
.meta-g{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.mf label{font-size:10px;font-weight:600;text-transform:uppercase;color:#888;display:block;margin-bottom:3px}
.mf input{width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#f8f8f8}
.mf input:focus{outline:none;border-color:#2d5be3;background:#fff}
.prog-row{display:flex;align-items:center;gap:10px}
.prog-row .track{flex:1;height:7px}
.pct-lbl{font-size:13px;font-weight:700;color:#2d5be3;min-width:36px}
.cnt-lbl{font-size:11px;color:#888}
/* Tab nav for sheets */
.sheet-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.sheet-tab{padding:5px 10px;border:1px solid #ddd;border-radius:20px;font-size:11px;cursor:pointer;background:#fff;white-space:nowrap;transition:all .1s}
.sheet-tab:hover{border-color:#2d5be3;color:#2d5be3}
.sheet-tab.active{background:#2d5be3;color:#fff;border-color:#2d5be3}
.sheet-tab.done-tab{border-color:#2d7a4f;color:#2d7a4f}
.sheet-tab.done-tab.active{background:#2d7a4f;color:#fff}
/* Actions */
.acts{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.act-btn{padding:6px 12px;border:1px solid #ddd;border-radius:6px;font-size:12px;cursor:pointer;background:#fff;color:#333}
.act-btn:hover{background:#f5f5f5}
.act-btn.primary{background:#2d5be3;color:#fff;border-color:#2d5be3}
/* Table */
.ct-wrap{background:#fff;border:1px solid #e0e0e0;border-radius:8px;overflow:auto}
table.ct{width:100%;border-collapse:collapse;font-size:12px}
table.ct th{background:#1a2744;color:#fff;padding:9px 8px;text-align:left;font-weight:500;font-size:11px;white-space:nowrap}
table.ct td{padding:7px 8px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
table.ct tr:last-child td{border-bottom:none}
table.ct tr.r-done td{background:#f0fdf4}
table.ct tr.r-av td{background:#fff5f5}
table.ct tr.r-na td{background:#f5f5f5;color:#bbb}
table.ct tr.r-na input:not([type=checkbox]),table.ct tr.r-na button{pointer-events:none;opacity:.4}
table.ct tr.r-na .av-btns{pointer-events:none;opacity:.4}
.rn{font-size:10px;color:#aaa;text-align:center;width:24px}
.ti{width:100%;padding:4px 6px;border:1px solid #ddd;border-radius:4px;font-size:11px;background:transparent;font-family:inherit}
.ti:focus{outline:none;border-color:#2d5be3}
.av-btns{display:flex;gap:3px}
.av{padding:4px 8px;border-radius:4px;border:1px solid #ddd;font-size:11px;cursor:pointer;background:#fff}
.av.ja.on{background:#ffe0e0;border-color:#e74c3c;color:#c0392b;font-weight:600}
.av.nei.on{background:#dcfce7;border-color:#2d7a4f;color:#166534;font-weight:600}
.sign-w{display:flex;flex-direction:column;gap:2px}
.dato{font-size:9px;color:#aaa}
/* Modal */
#cl-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a2744;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* Chip */
.chip{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:500}
.chip-done{background:#dcfce7;color:#166534}
.chip-prog{background:#fef9c3;color:#854d0e}
.chip-none{background:#f0f0f0;color:#888}
.chip-ph{background:#f0f0f0;color:#aaa}
/* Mobile */
@media(max-width:640px){
  .sidebar{display:none}
  .layout{height:calc(100vh - 50px)}
  .stats-row{grid-template-columns:1fr 1fr}
  .cards-grid{grid-template-columns:1fr 1fr}
}
@media print{.hdr,.sidebar,.acts,.sheet-tabs{display:none!important}.main{padding:0}*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}}

/* ── INNLOGGING ── */
#login-screen {
  position:fixed;inset:0;background:#f0f2f5;z-index:10000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:inherit;
}
.login-logo { margin-bottom:24px;text-align:center; }
.login-logo h1 { font-size:20px;color:#1a2744;margin:8px 0 4px; }
.login-logo p { font-size:13px;color:#888;margin:0; }
.user-grid {
  display:grid;grid-template-columns:1fr 1fr;gap:14px;
  max-width:380px;width:100%;padding:0 16px;margin-bottom:24px;
}
.user-card {
  background:#fff;border-radius:14px;padding:20px 16px;text-align:center;
  cursor:pointer;border:2px solid transparent;
  box-shadow:0 2px 12px rgba(0,0,0,.08);transition:all .18s;
}
.user-card:hover { border-color:#1a2744;transform:translateY(-2px);box-shadow:0 4px 18px rgba(0,0,0,.13); }
.user-avatar {
  width:52px;height:52px;border-radius:50%;background:#1a2744;
  color:#fff;font-size:20px;font-weight:700;display:flex;
  align-items:center;justify-content:center;margin:0 auto 10px;
}
.user-name { font-size:14px;font-weight:600;color:#1a2744;line-height:1.3; }

.pin-screen {
  background:#fff;border-radius:18px;padding:28px 24px;
  max-width:320px;width:90%;box-shadow:0 4px 30px rgba(0,0,0,.12);
  text-align:center;
}
.pin-screen h2 { font-size:17px;color:#1a2744;margin:0 0 4px; }
.pin-screen p { font-size:13px;color:#888;margin:0 0 20px; }
.pin-dots {
  display:flex;gap:12px;justify-content:center;margin-bottom:20px;
}
.pin-dot {
  width:16px;height:16px;border-radius:50%;border:2px solid #ccc;
  background:transparent;transition:all .15s;
}
.pin-dot.filled { background:#1a2744;border-color:#1a2744; }
.pin-dot.error { background:#c0392b;border-color:#c0392b; }
.pin-keypad {
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  max-width:240px;margin:0 auto;
}
.pin-key {
  background:#f5f7fa;border:none;border-radius:12px;padding:16px 0;
  font-size:20px;font-weight:600;color:#1a2744;cursor:pointer;
  transition:background .12s;
}
.pin-key:hover { background:#e0e5ef; }
.pin-key.del { font-size:16px;color:#888; }
.pin-back-btn {
  margin-top:16px;background:none;border:none;color:#888;
  font-size:13px;cursor:pointer;text-decoration:underline;
}
.login-user-badge {
  display:flex;align-items:center;gap:10px;
  background:#f0f3f8;border-radius:12px;padding:10px 14px;
  margin-bottom:20px;
}
.login-user-badge .avatar-sm {
  width:36px;height:36px;border-radius:50%;background:#1a2744;
  color:#fff;font-size:14px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.login-user-badge span { font-weight:600;color:#1a2744;font-size:14px; }

.mc-card.in-use { opacity:.55; background:#f5f5f5; border-color:#ccc; cursor:default; }
.mc-card.in-use:hover { transform:none; box-shadow:none; border-color:#ccc; }
.presence-badge {
  display:inline-flex;align-items:center;gap:4px;
  background:#1a2744;color:#fff;border-radius:10px;
  padding:2px 7px;font-size:11px;font-weight:600;margin-left:4px;
}
.presence-dot { width:6px;height:6px;border-radius:50%;background:#4ade80;display:inline-block; }

/* ── BILDER ── */
.img-section { margin-top:20px; padding:16px; background:#f9fafb; border-radius:12px; border:1px solid #e5e7eb; }
.img-section h3 { font-size:13px; font-weight:700; color:#1a2744; margin:0 0 12px; text-transform:uppercase; letter-spacing:.5px; }
.img-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; margin-bottom:12px; }
.img-thumb { position:relative; aspect-ratio:1; border-radius:8px; overflow:hidden; background:#e5e7eb; cursor:pointer; }
.img-thumb img { width:100%; height:100%; object-fit:cover; }
.img-thumb .img-del { position:absolute; top:4px; right:4px; background:rgba(0,0,0,.55); color:#fff; border:none; border-radius:50%; width:22px; height:22px; font-size:13px; cursor:pointer; display:none; align-items:center; justify-content:center; }
.img-thumb:hover .img-del { display:flex; }
.img-upload-btn { display:flex; align-items:center; gap:6px; padding:8px 14px; background:#1a2744; color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }
.img-upload-btn:disabled { opacity:.5; cursor:default; }
.img-lightbox { position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:9999; display:flex; align-items:center; justify-content:center; }
.img-lightbox img { max-width:90vw; max-height:90vh; border-radius:8px; box-shadow:0 8px 40px rgba(0,0,0,.5); }
.img-lightbox-close { position:absolute; top:20px; right:24px; color:#fff; font-size:32px; cursor:pointer; background:none; border:none; }
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-logo">
    <div style="font-size:32px">⚡</div>
    <h1>NKF-1005 Skyberg</h1>
    <p>MC Sjekklister — Velg bruker</p>
  </div>
  <div class="user-grid" id="user-grid"></div>
</div>

<div id="pin-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:10001;display:none;align-items:center;justify-content:center">
  <div class="pin-screen">
    <div class="login-user-badge" id="pin-user-badge">
      <div class="avatar-sm" id="pin-avatar"></div>
      <span id="pin-username"></span>
    </div>
    <h2 id="pin-title">Lag PIN-kode</h2>
    <p id="pin-subtitle">Velg 4 siffer</p>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key" onclick="pinKey('')" style="visibility:hidden"></button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
    </div>
    <button class="pin-back-btn" onclick="showUserGrid()">← Tilbake</button>
  </div>
</div>

// Sjekklister der noen rader ikke skal ha målt resultat-felt (0-indeksert)
const NO_MAAL_MAP={
  'MC-18':[1,2,3,4,5,6,7,8,9],
  'MC-19':[1,2,3,4,5,6,7,8,9]
};
const MC_IDS=Object.keys(MC_CFG);
let state={};
let currentMC=null;
let currentSheet=null;
let saveTimer=null;
let collapsedGroups=JSON.parse(localStorage.getItem('nkf_collapsed')||'{}');
let user=localStorage.getItem('nkf_user')||'Ukjent';

// ── STATE INIT ──
function initState(){
  MC_IDS.forEach(mcid=>{
    const cfg=MC_CFG[mcid];
    if(cfg.placeholder){
      if(!state[mcid]) state[mcid]={sheets:{}};
      return;
    }
    const mcData=MC_DATA[mcid]||{};
    if(!state[mcid]) state[mcid]={sheets:{}};
    Object.keys(mcData).forEach(sheetName=>{
      if(sheetName==='__placeholder__') return;
      if(!state[mcid].sheets[sheetName]){
        const items=mcData[sheetName].items||[];
        const meta=mcData[sheetName].meta||{};
        state[mcid].sheets[sheetName]={
          meta:{fabrikat:meta.fabrikat||'',driftsmerking:meta.driftsmerking||sheetName,serie_nr:meta.serie_nr||'',prosjekt:''},
          rows:items.map(()=>({avvik:null,maal:'',na:false,beskr:'',sign:'',dato:'',signBy:'',changelog:[]}))
        };
      }else{
        const items=mcData[sheetName].items||[];
        while(state[mcid].sheets[sheetName].rows.length<items.length)
          state[mcid].sheets[sheetName].rows.push({avvik:null,maal:'',na:false,beskr:'',sign:'',dato:'',signBy:'',changelog:[]});
      }
    });
  });
}

// ── STATS ──
function getSheetStats(mcid,sheetName){
  if(MC_CFG[mcid].placeholder) return {tot:0,av:0,sg:0,done:false,pct:0};
  const s=state[mcid]?.sheets[sheetName];
  if(!s) return {tot:0,av:0,sg:0,done:false,pct:0};
  const items=(MC_DATA[mcid]?.[sheetName]?.items)||[];
  const tot=items.length;
  if(tot===0) return {tot:0,av:0,sg:0,done:false,pct:0};
  const av=s.rows.filter(r=>r.na||r.avvik!==null).length;
  const sg=s.rows.filter(r=>r.na||(r.sign&&r.sign.trim())).length;
  const done=av===tot&&sg===tot;
  return{tot,av,sg,done,pct:Math.round((sg/tot)*100)};
}

function getMCStats(mcid){
  if(MC_CFG[mcid].placeholder) return{sheets:0,done:0,pct:0,hasAny:false,totalPoints:0};
  const mcData=MC_DATA[mcid]||{};
  const sheets=Object.keys(mcData).filter(s=>s!=='__placeholder__');
  if(sheets.length===0) return{sheets:0,done:0,pct:0,hasAny:false,totalPoints:0};
  let doneCnt=0,totalPct=0,hasAny=false,totalPoints=0;
  sheets.forEach(s=>{
    const st=getSheetStats(mcid,s);
    if(st.pct>0) hasAny=true;
    if(st.done) doneCnt++;
    totalPct+=st.pct;
    totalPoints+=st.tot;
  });
  return{sheets:sheets.length,done:doneCnt,pct:Math.round(totalPct/sheets.length),hasAny,totalPoints};
}

function getOverallStats(){
  let totalSheets=0,completedSheets=0,totalAvvik=0;
  MC_IDS.forEach(mcid=>{
    if(MC_CFG[mcid].placeholder) return;
    const mcData=MC_DATA[mcid]||{};
    const sheets=Object.keys(mcData).filter(s=>s!=='__placeholder__');
    if(sheets.length===0) return;
    sheets.forEach(sn=>{
      totalSheets++;
      const st=getSheetStats(mcid,sn);
      if(st.done) completedSheets++;
      const s=state[mcid]?.sheets[sn];
      if(s) s.rows.forEach(r=>{if(r.avvik==='ja') totalAvvik++;});
    });
  });
  const pct=totalSheets>0?Math.round((completedSheets/totalSheets)*100):0;
  return{total:totalSheets,done:completedSheets,pct,avvik:totalAvvik};
}


// ── PRESENCE ──
let _presenceTimer = null;

function updatePresence(mcid, sheetName) {
  if (!window.currentUser) return;
  if (!state.__presence__) state.__presence__ = {};
  state.__presence__[window.currentUser.id] = {
    name: window.currentUser.name,
    initials: window.currentUser.initials,
    mcid: mcid || null,
    sheet: sheetName || null,
    ts: Date.now()
  };
  // Save presence without triggering full debounce
  clearTimeout(_presenceTimer);
  _presenceTimer = setTimeout(async () => {
    try {
      const json = JSON.stringify(state);
      localStorage.setItem(LS_KEY, json);
      await fetch(WORKER, { method:'POST', headers:{'Content-Type':'application/json'}, body:json });
    } catch(e) {}
  }, 400);
}

function clearPresence() {
  if (!window.currentUser || !state.__presence__) return;
  delete state.__presence__[window.currentUser.id];
  try {
    const json = JSON.stringify(state);
    localStorage.setItem(LS_KEY, json);
    fetch(WORKER, { method:'POST', headers:{'Content-Type':'application/json'}, body:json });
  } catch(e) {}
}

function getPresenceForMC(mcid) {
  if (!state.__presence__) return [];
  const now = Date.now();
  const STALE = 2 * 60 * 1000; // 2 min uten ping = regnes som borte
  return Object.entries(state.__presence__)
    .filter(([uid, p]) => p.mcid === mcid && uid !== (window.currentUser?.id) && (now - p.ts) < STALE)
    .map(([, p]) => p);
}

function getPresenceForSheet(mcid, sheetName) {
  if (!state.__presence__) return [];
  const now = Date.now();
  const STALE = 2 * 60 * 1000;
  return Object.entries(state.__presence__)
    .filter(([uid, p]) => p.mcid === mcid && p.sheet === sheetName && uid !== (window.currentUser?.id) && (now - p.ts) < STALE)
    .map(([, p]) => p);
}

// Poll cloud every 30s to get other users' presence
setInterval(() => {
  fetch(WORKER, { method:'GET' }).then(r => r.ok ? r.json() : null).then(data => {
    if (data && data.__presence__) {
      state.__presence__ = data.__presence__;
      // Re-render current view to update presence indicators
      buildSidebar();
      if (currentMC && currentSheet) renderSheet(currentMC, currentSheet);
      else if (currentMC) openMC(currentMC);
      else showHome();
    }
  }).catch(() => {});
}, 30000);

// ── CLOUD SYNC ──
function setSyncStatus(s){
  const d=document.getElementById('dot');
  if(d) d.className='dot'+(s==='err'?' err':s==='syncing'?' syncing':'');
}

function save(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    const json=JSON.stringify(state);
    try{localStorage.setItem(LS_KEY,json);}catch(e){}
    try{
      const r=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:json});
      setSyncStatus(r.ok?'ok':'err');
    }catch(e){setSyncStatus('err');}
  },800);
}

async function loadCloud(){
  setSyncStatus('syncing');
  try{
    const local=localStorage.getItem(LS_KEY);
    if(local) state=JSON.parse(local);
  }catch(e){}
  initState();
  setSyncStatus('ok');
  // Background cloud sync
  fetch(WORKER,{method:'GET'}).then(r=>r.ok?r.json():null).then(data=>{
    if(data&&Object.keys(data).length>0){
      state=data;
      initState();
      buildSidebar();
      if(!currentMC) showHome();
      else if(currentSheet) renderSheet(currentMC,currentSheet);
      setSyncStatus('ok');
    }
  }).catch(()=>setSyncStatus('err'));
}

// ── SIDEBAR ──
function toggleGroup(kat){
  collapsedGroups[kat]=!collapsedGroups[kat];
  localStorage.setItem('nkf_collapsed',JSON.stringify(collapsedGroups));
  buildSidebar();
}
function buildSidebar(q){
  q=(q||'').toLowerCase();
  const groups={'Felles':'Sjekklister','420kV':'MC Sjekklister — 420 kV','132kV':'MC Sjekklister — 132 kV'};
  const groupColors={'420kV':'kv420','132kV':'kv132','Felles':'felles'};
  let html='';
  Object.keys(groups).forEach(kat=>{
    const mcs=MC_IDS.filter(id=>MC_CFG[id].kat===kat&&(!q||MC_CFG[id].navn.toLowerCase().includes(q)||id.toLowerCase().includes(q)));
    if(mcs.length===0) return;
    const isCollapsed=collapsedGroups[kat]&&!q;
    html+=`<div class="s-group-hdr ${groupColors[kat]}${isCollapsed?' collapsed':''}" onclick="toggleGroup('${kat}')">${groups[kat]}<span class="collapse-arrow">▼</span></div>`;
    html+=`<div class="s-group-items${isCollapsed?' hidden':''}">`;
    mcs.forEach(mcid=>{
      const cfg=MC_CFG[mcid];
      const st=getMCStats(mcid);
      let badge;
      if(cfg.placeholder) badge=`<span class="s-badge bph">—</span>`;
      else if(st.pct===100&&st.sheets>0) badge=`<span class="s-badge bd">✓</span>`;
      else if(st.pct>0) badge=`<span class="s-badge bp">${st.pct}%</span>`;
      else badge=`<span class="s-badge bn">—</span>`;
      const active=currentMC===mcid?' active':'';
      const ph=cfg.placeholder?' placeholder':'';
      html+=`<div class="s-mc${active}${ph}" onclick="${cfg.placeholder?'':'openMC(\''+mcid+'\')'}">
        <span class="s-mc-name">${cfg.navn}</span>${badge}
      </div>`;
    });
    // Add RIR and Changelog links only for Felles group
    if(kat==='Felles'){
      html+=`<div class="s-mc${currentMC==='__rir__'?' active':''}" onclick="showRIR()" style="border-top:1px solid #e8e8e8;margin-top:4px">
        <span class="s-mc-name" style="color:#1a6b3a">📦 Mottakskontroll (RIR)</span>
      </div>`;
      html+=`<div class="s-mc${currentMC==='__changelog__'?' active':''}" onclick="showChangelog()" style="border-top:1px solid #e8e8e8;margin-top:2px">
        <span class="s-mc-name" style="color:#5a4a8a">📋 Versjonshistorikk</span>
      </div>`;
    }
    html+='</div>';
  });
  document.getElementById('sList').innerHTML=html;
}

function filterSidebar(q){buildSidebar(q);}

function applyRIRPrefill() {
  const rir = getRIRState();
  if (!rir.rapporter) rir.rapporter = {};
  let changed = false;
  Object.entries(RIR_PREFILL).forEach(([id, data]) => {
    if (!rir.rapporter[id]) {
      rir.rapporter[id] = data;
      changed = true;
    }
  });
  if (changed) {
    state.__rir__ = rir;
    save();
  }
}

function getRIRState() {
  if (!state.__rir__) state.__rir__ = { rapporter: {} };
  return state.__rir__;
}

function formatDato(d) {
  if (!d || d.length !== 8) return d;
  return d.slice(6,8) + '.' + d.slice(4,6) + '.' + d.slice(0,4);
}

function showRIR() {
  currentMC = '__rir__';
  currentSheet = null;
  buildSidebar();
  renderRIR();
}

function renderRIR() {
  const rir = getRIRState();
  const nextId = (RIR_LOG.length + 1).toString().padStart(2,'0');

  const logRows = RIR_LOG.map(r => {
    const saved = rir.rapporter[r.id] || {};
    const status = saved.resultat || '';
    const statusColor = status === 'OK' ? '#2d7a4f' : status === 'Avvik' ? '#c0392b' : '#888';
    return `<tr style="border-bottom:1px solid #f0f0f0;cursor:pointer" onclick="showRIRDetail('${r.id}')" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background=''">
      <td style="padding:8px 10px;color:#888;font-size:12px;white-space:nowrap">${r.id}</td>
      <td style="padding:8px 10px;font-size:13px;color:#1a2744">${r.beskrivelse}</td>
      <td style="padding:8px 10px;font-size:12px;color:#555;white-space:nowrap">${formatDato(r.dato)}</td>
      <td style="padding:8px 10px;text-align:center">
        ${status ? `<span style="background:${statusColor};color:#fff;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:600">${status}</span>` : '<span style="color:#ccc;font-size:11px">—</span>'}
      </td>
    </tr>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div style="padding:20px;max-width:900px">

function rirTogglePakking(option, checked) {
  if (!window._rirPakking) window._rirPakking = [];
  if (checked) { if (!window._rirPakking.includes(option)) window._rirPakking.push(option); }
  else { window._rirPakking = window._rirPakking.filter(o => o !== option); }
}

function saveRIR(id) {
  const rir = getRIRState();
  if (!rir.rapporter) rir.rapporter = {};

  // Collect status checkboxes
  const statusFields = ['Pictures Taken','Open','Broken','Smashed','Deformed','Soaked/Wet','Rusty/Corroded','Water tight','Sealed'];
  const statusObj = {};
  statusFields.forEach(o => {
    const name = 'rir_' + o.replace(/\W/g,'_');
    const checked = document.querySelector(`input[name="${name}"]:checked`);
    if (checked) statusObj[o] = checked.value;
  });

  rir.rapporter[id] = {
    reportnr: document.getElementById('rir_reportnr')?.value || '',
    dato: document.getElementById('rir_dato')?.value || '',
    receiver: document.getElementById('rir_receiver')?.value || '',
    project: document.getElementById('rir_project')?.value || '',
    customer: document.getElementById('rir_customer')?.value || '',
    ponr: document.getElementById('rir_ponr')?.value || '',
    supplier: document.getElementById('rir_supplier')?.value || '',
    origin: document.getElementById('rir_origin')?.value || '',
    weight: document.getElementById('rir_weight')?.value || '',
    packref: document.getElementById('rir_packref')?.value || '',
    pakking: window._rirPakking || [],
    status: statusObj,
    comments: document.getElementById('rir_comments')?.value || '',
    resultat: document.getElementById('rir_resultat')?.value || '',
    signert: window.currentUser?.name || '',
    lagretDato: new Date().toLocaleDateString('no-NO'),
  };

  state.__rir__ = rir;
  save();
  toast('RIR lagret!');
  renderRIR();
}

function showHome(){
  currentMC=null; currentSheet=null;
  buildSidebar();
  const ov=getOverallStats();
  const d=new Date();
  const ds=d.toLocaleDateString('no-NO')+' '+d.toLocaleTimeString('no-NO',{hour:'2-digit',minute:'2-digit'});

  const groups=[
    {kat:'420kV',label:'420 kV',cls:'kv420'},
    {kat:'132kV',label:'132 kV',cls:'kv132'},
    {kat:'Felles',label:'Felles',cls:'felles'},
  ];

  let catHtml='';
  groups.forEach(({kat,label,cls})=>{
    const mcs=MC_IDS.filter(id=>MC_CFG[id].kat===kat);
    let catDone=0,catTotal=0,catPctSum=0,catAvvik=0;
    mcs.forEach(id=>{
      if(MC_CFG[id].placeholder) return;
      const st=getMCStats(id);
      if(st.sheets>0){catTotal++;catPctSum+=st.pct;if(st.pct===100)catDone++;}
      const mcData2=MC_DATA[id]||{};
      Object.keys(mcData2).filter(s=>s!=='__placeholder__').forEach(sn=>{
        const s=state[id]?.sheets[sn];
        if(s) s.rows.forEach(r=>{if(r.avvik==='ja') catAvvik++;});
      });
    });
    const catPct=catTotal>0?Math.round(catPctSum/catTotal):0;

    let cards='';
    mcs.forEach(mcid=>{
      const cfg=MC_CFG[mcid];
      const st=getMCStats(mcid);
      if(cfg.placeholder){
        cards+=`<div class="mc-card placeholder-card">
          <div class="mc-card-nr">${mcid} · ${cfg.nr}</div>
          <div class="mc-card-name">${cfg.navn}</div>
          <span class="placeholder-badge">Under utarbeiding</span>
        </div>`;
        return;
      }
      const isActive=currentMC===mcid;
      const isDone=st.pct===100&&st.sheets>0;
      const presenceUsers=getPresenceForMC(mcid);
      const inUse=presenceUsers.length>0;
      let chip;
      if(isDone) chip=`<span class="chip chip-done">✓ Fullført</span>`;
      else if(st.pct>0) chip=`<span class="chip chip-prog">Påbegynt</span>`;
      else chip=`<span class="chip chip-none">Ikke startet</span>`;
      const presenceBadge=inUse?presenceUsers.map(p=>`<span class="presence-badge"><span class="presence-dot"></span>${p.name.split(' ')[0]}</span>`).join(''):'';
      cards+=`<div class="mc-card${isDone?' done':''}${isActive?' active-card':''}${inUse&&!isActive?' in-use':''}" onclick="${inUse&&!isActive?'':"openMC('"+ mcid +"')"}">
        <div class="mc-card-nr">${mcid} · ${cfg.nr}</div>
        <div class="mc-card-name">${cfg.navn}${presenceBadge}</div>
        ${inUse&&!isActive?`<div style="font-size:11px;color:#888;margin-top:4px">Opptatt av ${presenceUsers.map(p=>p.name.split(' ')[0]).join(', ')}</div>`:''}
        <div class="mc-prog-row">
          <div class="track"><div class="fill" style="width:${st.pct}%"></div></div>
          <span class="mc-pct${isDone?' done-pct':''}">${st.pct}%</span>
        </div>
        <div class="mc-stats">
          <span>${chip}</span>
          <span style="margin-left:auto">${st.done}/${st.sheets} ark</span>
        </div>
      </div>`;
    });

    catHtml+=`<div class="cat-section">
      <div class="cat-hdr ${cls}">
        <h2>${label}</h2>
        <div style="font-size:11px;opacity:.8">${catDone}/${catTotal} fullført${catAvvik>0?` · <span style="border-bottom:2px dotted #c0392b;cursor:pointer" onclick="event.stopPropagation();showAvvikModal('${kat}')">${catAvvik} avvik</span>`:""}</div>
        <div class="cat-pct">${catPct}%</div>
      </div>
      <div class="cards-grid">${cards}</div>
    </div>`;
  });

  document.getElementById('main').innerHTML=`<div class="dash">
    <div class="dash-title">NKF-1005 Skyberg Transformatorstasjon</div>
    <div class="dash-sub">MC Sjekklister · ${ds}</div>
    <div class="stats-row">
      <div class="stat"><div class="stat-l">Total fremgang</div><div class="stat-v">${ov.pct}%</div><div class="stat-s">${ov.done} av ${ov.total} sjekklister</div></div>
      <div class="stat"><div class="stat-l">Utestående avvik</div><div class="stat-v" style="color:${ov.avvik>0?'#c0392b':'#2d7a4f'}" ${ov.avvik>0?'onclick="showAvvikModal()" style="cursor:pointer"':''}>${ov.avvik>0?`<span style="border-bottom:2px dotted #c0392b;cursor:pointer" onclick="showAvvikModal()">${ov.avvik}</span>`:ov.avvik}</div><div class="stat-s">${ov.avvik>0?'åpne Ja-avvik':'ingen avvik'}</div></div>
      <div class="stat"><div class="stat-l">420 kV</div><div class="stat-v">${getMCCatPct('420kV')}%</div><div class="stat-s">fremgang</div></div>
      <div class="stat"><div class="stat-l">132 kV</div><div class="stat-v">${getMCCatPct('132kV')}%</div><div class="stat-s">fremgang</div></div>
    </div>
    <div class="prog-card">
      <div class="prog-top"><span>Samlet fremgang (alle sjekklister)</span><span class="prog-pct">${ov.pct}%</span></div>
      <div class="track"><div class="fill" style="width:${ov.pct}%"></div></div>
    </div>
    ${catHtml}
  </div>`;
}

function getMCCatPct(kat){
  const mcs=MC_IDS.filter(id=>MC_CFG[id].kat===kat&&!MC_CFG[id].placeholder);
  if(mcs.length===0) return 0;
  const sum=mcs.reduce((a,id)=>{const st=getMCStats(id);return a+(st.sheets>0?st.pct:0);},0);
  return Math.round(sum/mcs.length);
}

function showAvvikModal(filterKat){
  // Samle alle avvik på tvers av alle MC-er
  const avvikListe = [];
  MC_IDS.forEach(mcid => {
    if(MC_CFG[mcid].placeholder) return;
    // Filtrer på kategori hvis angitt
    if(filterKat && MC_CFG[mcid].kat !== filterKat) return;
    const mcData = MC_DATA[mcid] || {};
    const sheetNames = Object.keys(mcData).filter(s => s !== '__placeholder__');
    sheetNames.forEach(sn => {
      const s = state[mcid]?.sheets[sn];
      if(!s) return;
      const antallAvvik = s.rows.filter(r => r.avvik === 'ja').length;
      if(antallAvvik > 0) {
        avvikListe.push({ mcid, mcNavn: MC_CFG[mcid].navn, ark: sn, antall: antallAvvik });
      }
    });
  });

  // Grupper per MC
  const perMC = {};
  avvikListe.forEach(a => {
    if(!perMC[a.mcid]) perMC[a.mcid] = { navn: a.mcNavn, ark: [] };
    perMC[a.mcid].ark.push({ ark: a.ark, antall: a.antall });
  });

  const totalAvvik = avvikListe.reduce((s,a) => s + a.antall, 0);

  let rows = '';
  Object.entries(perMC).forEach(([mcid, data]) => {
    const mcTotal = data.ark.reduce((s,a) => s + a.antall, 0);
    rows += `<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#fff3f3;border-radius:8px;border-left:4px solid #c0392b;cursor:pointer" onclick="document.getElementById('avvik-ark-${mcid}').style.display=document.getElementById('avvik-ark-${mcid}').style.display==='none'?'block':'none'" title="Klikk for å vise/skjule ark">
        <div>
          <span style="font-weight:700;color:#1a2744">${mcid}</span>
          <span style="color:#555;margin-left:8px;font-size:13px">${data.navn}</span>
        </div>
        <span style="background:#c0392b;color:#fff;border-radius:12px;padding:2px 10px;font-size:13px;font-weight:700">${mcTotal} avvik</span>
      </div>
      <div id="avvik-ark-${mcid}" style="display:block;margin-top:4px;padding:0 12px">
        ${data.ark.map(a => `<div onclick="document.getElementById('avvik-modal').remove();openSheet('${mcid}','${a.ark.replace(/'/g,"\\'")}')" style="display:flex;justify-content:space-between;align-items:center;padding:8px 8px;border-bottom:1px solid #f0f0f0;font-size:13px;cursor:pointer;border-radius:6px;transition:background .15s" onmouseover="this.style.background='#fdf0f0'" onmouseout="this.style.background='transparent'">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="color:#c0392b;font-size:16px">→</span>
            <span style="color:#1a2744;font-weight:500">${a.ark}</span>
          </div>
          <span style="background:#ffe0e0;color:#c0392b;border-radius:10px;padding:2px 8px;font-size:12px;font-weight:700">${a.antall} avvik</span>

      </div>
    </div>`;
  });

  if(rows === '') {
    rows = '<div style="text-align:center;color:#888;padding:24px">Ingen avvik registrert</div>';
  }

  const tittel = filterKat
    ? (filterKat==='420kV'?'420 kV':filterKat==='132kV'?'132 kV':'Andre') + ' – Avviksrapport'
    : 'Avviksrapport – alle MC-er';

  const modal = document.createElement('div');
  modal.id = 'avvik-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center';
  modal.innerHTML = `
    <div style="background:#f9fafb;border-radius:14px;width:min(520px,95vw);max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.25)">
      <div style="padding:18px 20px 14px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:17px;font-weight:700;color:#1a2744">${tittel}</div>
          <div style="font-size:13px;color:#888;margin-top:2px">${totalAvvik} avvik totalt i ${Object.keys(perMC).length} MC-er</div>
        </div>
        <button onclick="document.getElementById('avvik-modal').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1">×</button>
      </div>
      <div style="overflow-y:auto;padding:16px 20px;flex:1">${rows}</div>
      <div style="padding:12px 20px;border-top:1px solid #e5e7eb;text-align:right">
        <button onclick="document.getElementById('avvik-modal').remove()" style="background:#1a2744;color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:14px;cursor:pointer">Lukk</button>
      </div>
    </div>`;
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
  document.body.appendChild(modal);
}

function openMC(mcid){
  if(MC_CFG[mcid].placeholder) return;
  currentMC=mcid;
  const mcData=MC_DATA[mcid]||{};
  const sheets=Object.keys(mcData).filter(s=>s!=='__placeholder__');
  currentSheet=sheets[0]||null;
  buildSidebar();
  if(currentSheet){ renderSheet(mcid,currentSheet); updatePresence(mcid, currentSheet); }
  document.getElementById('main').scrollTop=0;
}

function openSheet(mcid,sheetName){
  currentMC=mcid; currentSheet=sheetName;
  renderSheet(mcid,sheetName);
  updatePresence(mcid, sheetName);
  document.getElementById('main').scrollTop=0;
}

// ── RENDER SHEET ──
function renderSheet(mcid,sheetName){
  const cfg=MC_CFG[mcid];
  const mcData=MC_DATA[mcid]||{};
  const sheets=Object.keys(mcData).filter(s=>s!=='__placeholder__');
  const s=state[mcid]?.sheets[sheetName];
  if(!s){openMC(mcid);return;}
  const items=mcData[sheetName]?.items||[];
  const st=getSheetStats(mcid,sheetName);
  const sidx=sheets.indexOf(sheetName);
  const prev=sidx>0?sheets[sidx-1]:null;
  const next=sidx<sheets.length-1?sheets[sidx+1]:null;

  // Sheet dropdown
  const doneCount=sheets.filter(sn=>getSheetStats(mcid,sn).done).length;
  const tabsHtml=`<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <select onchange="openSheet('${mcid}',this.value)" style="padding:7px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff;cursor:pointer;min-width:200px;max-width:350px">
      ${sheets.map(sn=>{
        const sst=getSheetStats(mcid,sn);
        const sel=sn===sheetName?'selected':'';
        const tick=sst.done?' ✓':'';
        const sheetPresence=getPresenceForSheet(mcid,sn);
        const pMark=sheetPresence.length>0?' 👤 '+sheetPresence.map(p=>p.name.split(' ')[0]).join(', '):'';
        return `<option value="${sn.replace(/"/g,'&quot;')}" ${sel}>${sn}${tick}${pMark}</option>`;
      }).join('')}
    </select>
    <span style="font-size:12px;color:#888">${sheets.indexOf(sheetName)+1} av ${sheets.length} · ${doneCount} fullført</span>
  </div>`;

  const rows=items.map((item,i)=>{
    const r=s.rows[i]||{};
    const isDone=r.avvik!==null&&r.sign&&r.sign.trim();
    const isAv=r.avvik==='ja';
    const rc=r.na?' r-na':isDone?' r-done':isAv?' r-av':'';
    const jaOn=r.avvik==='ja'?' on':'';
    const neiOn=r.avvik==='nei'?' on':'';
    const naChk=r.na?'checked':'';
    const maalDis=r.na?'disabled style="background:#f0f0f0;color:#aaa"':'';
    const signInfo=r.dato?`<div class="dato">${r.dato}${r.signBy?' · '+r.signBy:''}</div>`:'';
    return `<tr class="${rc}">
      <td class="rn">${i+1}</td>
      <td style="min-width:100px;font-weight:500">${esc(item.element)}</td>
      <td style="min-width:90px;color:#666;font-size:11px">${esc(item.metode)}</td>
      <td style="min-width:110px">
        ${(NO_MAAL_MAP[mcid]&&NO_MAAL_MAP[mcid].includes(i)) ?
          `<div style="display:flex;align-items:center;gap:5px">
            <div style="flex:1"></div>
            <label style="display:flex;align-items:center;gap:3px;font-size:10px;color:#888;cursor:pointer;white-space:nowrap;padding:3px 6px;border:1px solid #ddd;border-radius:4px;background:${r.na?'#f0f0f0':'#fff'}">
              <input type="checkbox" ${naChk} onchange="togNA('${mcid}','${sheetName.replace(/'/g,"\\'")}',${i},this.checked)" style="width:12px;height:12px;cursor:pointer;margin:0;pointer-events:auto;opacity:1">N/A
            </label>
          </div>` :
          `<div style="display:flex;align-items:center;gap:5px">
            <input class="ti" type="text" placeholder="Resultat" value="${esc(r.maal||'')}" ${maalDis} onchange="updRow('${mcid}','${sheetName.replace(/'/g,"\\'")}',${i},'maal',this.value)" style="flex:1">
            <label style="display:flex;align-items:center;gap:3px;font-size:10px;color:#888;cursor:pointer;white-space:nowrap;padding:3px 6px;border:1px solid #ddd;border-radius:4px;background:${r.na?'#f0f0f0':'#fff'}">
              <input type="checkbox" ${naChk} onchange="togNA('${mcid}','${sheetName.replace(/'/g,"\\'")}',${i},this.checked)" style="width:12px;height:12px;cursor:pointer;margin:0;pointer-events:auto;opacity:1">N/A
            </label>
          </div>`
        }
      </td>
      <td style="min-width:80px"><div class="av-btns">
        <button class="av ja${jaOn}" onclick="togAvvik('${mcid}','${sheetName.replace(/'/g,"\\'")}',${i},'ja')">Ja</button>
        <button class="av nei${neiOn}" onclick="togAvvik('${mcid}','${sheetName.replace(/'/g,"\\'")}',${i},'nei')">Nei</button>
      </div></td>
      <td style="min-width:100px"><textarea class="ti" placeholder="Beskrivelse" data-mcid="${mcid}" data-sn="${sheetName}" data-idx="${i}" data-field="beskr" oninput="autoResize(this);handleTaChange(this)" style="resize:none;overflow:hidden;min-height:28px;line-height:1.4;padding:4px 6px;font-family:inherit">${esc(r.beskr||"")}</textarea></td>
      <td style="min-width:90px"><div class="sign-w">
        ${r.sign
          ? `<div style="font-size:12px;font-weight:600;color:#2d7a4f;padding:4px 0">${esc(r.sign)}${window.currentUser?.id==='helge'?` <button onclick="removeSign('${mcid}','${sheetName.replace(/'/g,"\\'")}',${i})" title="Fjern signatur" style="background:none;border:none;color:#c0392b;cursor:pointer;font-size:13px;padding:0 2px;vertical-align:middle">✕</button>`:''}</div>${signInfo}`
          : `<button onclick="signRow('${mcid}','${sheetName.replace(/'/g,"\\'")}',${i})" style="background:#1a2744;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer">Signer</button>`
        }
      </div></td>
    </tr>`;
  }).join('');

  document.getElementById('main').innerHTML=`<div class="cl">
    <div class="cl-hdr">
      <div class="cl-hdr-top">
        <img src="${LOGO}" style="height:36px;object-fit:contain" alt="Linjemontage">
        <div>
          <div class="cl-title">${cfg.navn}</div>
          <div class="cl-nr">${cfg.nr} · ${sheetName}</div>
        </div>
        ${st.done?'<span class="chip chip-done" style="margin-left:auto">✓ Fullført</span>':''}
      </div>
      <div class="meta-g">
        <div class="mf"><label>Fabrikat</label><input type="text" value="${esc(s.meta.fabrikat||'')}" onchange="updMeta('${mcid}','${sheetName.replace(/'/g,"\\'")}','fabrikat',this.value)"></div>
        <div class="mf"><label>Driftsmerking</label><input type="text" value="${esc(s.meta.driftsmerking||'')}" onchange="updMeta('${mcid}','${sheetName.replace(/'/g,"\\'")}','driftsmerking',this.value)"></div>
        <div class="mf"><label>Serie nr.</label><input type="text" value="${esc(s.meta.serie_nr||'')}" onchange="updMeta('${mcid}','${sheetName.replace(/'/g,"\\'")}','serie_nr',this.value)"></div>
        <div class="mf"><label>Prosjekt</label><input type="text" value="${esc(s.meta.prosjekt||'')}" onchange="updMeta('${mcid}','${sheetName.replace(/'/g,"\\'")}','prosjekt',this.value)"></div>
      </div>
      <div class="prog-row">
        <div class="track"><div class="fill" style="width:${st.pct}%"></div></div>
        <span class="pct-lbl">${st.pct}%</span>
        <span class="cnt-lbl">${st.sg}/${st.tot} signert</span>
      </div>
    </div>
    ${sheets.length>1?`<div style="margin-bottom:10px">${tabsHtml}</div>`:''}
    <div class="acts">
      ${prev?`<button class="act-btn" onclick="openSheet('${mcid}','${prev.replace(/'/g,"\\'")}')">← ${prev}</button>`:''}
      <button class="act-btn" onclick="showHome()">🏠 Hjem</button>
      <button class="act-btn primary" onclick="exportPDF()">Eksporter PDF</button>
      ${next?`<button class="act-btn" onclick="openSheet('${mcid}','${next.replace(/'/g,"\\'")}')">→ ${next}</button>`:''}
    </div>
    <div class="ct-wrap">
      <table class="ct">
        <thead><tr><th>#</th><th>Element</th><th>Metode</th><th>Målt resultat</th><th>Avvik</th><th>Beskrivelse</th><th>Signatur</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${buildChangelog(mcid,sheetName)}
    <div class="img-section">
      <h3>📷 Bilder</h3>
      <div class="img-grid" id="img-grid-${mcid}-${sheetName.replace(/[^a-zA-Z0-9]/g,'-')}">
        <div style="color:#aaa;font-size:13px;grid-column:1/-1" id="img-loading-${mcid}-${sheetName.replace(/[^a-zA-Z0-9]/g,'-')}">Laster bilder...</div>
      </div>
      <button class="img-upload-btn" onclick="triggerImageUpload('${mcid}','${sheetName.replace(/'/g,"\\'")}')">
        📎 Last opp bilde
      </button>
      <input type="file" id="img-input-${mcid}-${sheetName.replace(/[^a-zA-Z0-9]/g,'-')}" accept="image/*" multiple style="display:none" onchange="uploadImages(this,'${mcid}','${sheetName.replace(/'/g,"\\'")}')">
    </div>
  </div>`;
  // Load images after render
  setTimeout(() => loadImages('${mcid}','${sheetName}'), 50);
}

// ── CHANGELOG ──
function buildChangelog(mcid,sheetName){
  const s=state[mcid]?.sheets[sheetName];
  if(!s) return '';
  const items=MC_DATA[mcid]?.[sheetName]?.items||[];
  const hasLog=s.rows.some(r=>r.changelog&&r.changelog.length>0);
  if(!hasLog) return '';
  let rows='';
  s.rows.forEach((r,i)=>{
    if(!r.changelog||!r.changelog.length) return;
    r.changelog.forEach(log=>{
      const fraC=log.fra==='ja'?'#ffe0e0':log.fra==='nei'?'#dcfce7':'#f0f0f0';
      const tilC=log.til==='ja'?'#ffe0e0':log.til==='nei'?'#dcfce7':'#f0f0f0';
      rows+=`<tr style="border-bottom:1px solid #f0f0f0">
        <td style="padding:6px 8px;color:#aaa;text-align:center;font-size:10px">${i+1}</td>
        <td style="padding:6px 8px;font-weight:500;font-size:12px">${esc(items[i]?.element||'')}</td>
        <td style="padding:6px 8px;font-size:11px;color:#666">${esc(items[i]?.metode||'')}</td>
        <td style="padding:6px 8px;text-align:center"><span style="background:${fraC};padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500">${log.fra||'—'}</span></td>
        <td style="padding:6px 8px;text-align:center;color:#888">→</td>
        <td style="padding:6px 8px;text-align:center"><span style="background:${tilC};padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500">${log.til}</span></td>
        <td style="padding:6px 8px;font-size:12px">${esc(log.kommentar)}</td>
        <td style="padding:6px 8px;font-size:11px;font-weight:500">${esc(log.sign)}</td>
        <td style="padding:6px 8px;font-size:10px;color:#888;white-space:nowrap">${log.tid}</td>
      </tr>`;
    });
  });
  if(!rows) return '';
  return `<div style="margin-top:16px;background:#fff;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden">
    <div style="padding:10px 14px;font-weight:600;font-size:13px;border-bottom:1px solid #eee;background:#f8f8f8;color:#1a2744">✎ Changelog — Endringslogg</div>
    <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">
      <thead><tr style="background:#f8f8f8">
        ${['#','Element','Metode','Fra','','Til','Kommentar','Signert av','Tidspunkt'].map(h=>`<th style="padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase;color:#888;border-bottom:1px solid #eee">${h}</th>`).join('')}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
}

// ── ACTIONS ──
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function updMeta(mcid,sn,f,v){if(state[mcid]?.sheets[sn])state[mcid].sheets[sn].meta[f]=v;save();}
function updRow(mcid,sn,i,f,v){if(state[mcid]?.sheets[sn])state[mcid].sheets[sn].rows[i][f]=v;save();}
function autoResize(el){
  el.style.height='auto';
  el.style.height=el.scrollHeight+'px';
}
function handleTaChange(el){
  const mcid=el.dataset.mcid;
  const sn=el.dataset.sn;
  const i=parseInt(el.dataset.idx);
  const field=el.dataset.field;
  updRow(mcid,sn,i,field,el.value);
}

function togNA(mcid,sn,i,val){
  if(!state[mcid]?.sheets[sn]) return;
  state[mcid].sheets[sn].rows[i].na=val;
  if(val) state[mcid].sheets[sn].rows[i].maal='';
  save(); renderSheet(mcid,sn); buildSidebar();
}
function removeSign(mcid,sn,i){
  if(window.currentUser?.id !== 'helge') return;
  if(!confirm('Fjerne signaturen?')) return;
  if(!state[mcid]?.sheets[sn]) return;
  state[mcid].sheets[sn].rows[i].sign = '';
  state[mcid].sheets[sn].rows[i].dato = '';
  state[mcid].sheets[sn].rows[i].signBy = '';
  save(); renderSheet(mcid,sn); buildSidebar();
}

function signRow(mcid,sn,i){
  if(!state[mcid]?.sheets[sn]) return;
  const user = window.currentUser;
  if(!user){ alert('Ingen bruker innlogget'); return; }
  state[mcid].sheets[sn].rows[i].sign = user.name;
  state[mcid].sheets[sn].rows[i].dato = new Date().toLocaleDateString('no-NO');
  state[mcid].sheets[sn].rows[i].signBy = user.name;
  save(); renderSheet(mcid,sn); buildSidebar();
}
function updSign(mcid,sn,i,v){
  if(!state[mcid]?.sheets[sn]) return;
  state[mcid].sheets[sn].rows[i].sign=v;
  if(v.trim()){
    state[mcid].sheets[sn].rows[i].dato=new Date().toLocaleDateString('no-NO');
    state[mcid].sheets[sn].rows[i].signBy=user;
  }else{
    state[mcid].sheets[sn].rows[i].dato='';
    state[mcid].sheets[sn].rows[i].signBy='';
  }
  save(); renderSheet(mcid,sn); buildSidebar();
}
function togAvvik(mcid,sn,i,v){
  if(!state[mcid]?.sheets[sn]) return;
  const prev=state[mcid].sheets[sn].rows[i].avvik;
  if(prev==='ja'&&v==='nei'){showChangelogDialog(mcid,sn,i,v);return;}
  state[mcid].sheets[sn].rows[i].avvik=state[mcid].sheets[sn].rows[i].avvik===v?null:v;
  save(); renderSheet(mcid,sn); buildSidebar();
}

// ── CHANGELOG DIALOG ──
function showChangelogDialog(mcid,sn,i,newVal){
  window._pc={mcid,sn,i,newVal};
  const items=MC_DATA[mcid]?.[sn]?.items||[];
  const item=items[i]||{};
  const now=new Date().toLocaleString('no-NO');
  const overlay=document.createElement('div');
  overlay.id='cl-modal';
  overlay.innerHTML=`<div style="background:#fff;border-radius:10px;padding:24px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.2)">
    <h3 style="font-size:15px;font-weight:700;color:#1a2744;margin-bottom:4px">Endre avvik</h3>
    <p style="font-size:12px;color:#888;margin-bottom:12px">${esc(item.element)} — ${esc(item.metode)}</p>
    <p style="font-size:12px;color:#666;margin-bottom:12px">Endring: <b style="color:#c0392b">Ja</b> → <b style="color:#2d7a4f">Nei</b></p>
    <label style="font-size:10px;font-weight:700;text-transform:uppercase;color:#888;display:block;margin-bottom:4px">Kommentar (påkrevd)</label>
    <textarea id="cl-comment" placeholder="Begrunn endringen..." style="width:100%;height:80px;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;resize:vertical;margin-bottom:12px;display:block"></textarea>
    <label style="font-size:10px;font-weight:700;text-transform:uppercase;color:#888;display:block;margin-bottom:4px">Signatur</label>
    <div style="width:100%;padding:8px;border:1px solid #e0e0e0;border-radius:6px;font-size:13px;margin-bottom:6px;background:#f5f7fa;color:#1a2744;font-weight:600">${window.currentUser?.name || 'Ukjent bruker'}</div>
    <input id="cl-sign" type="hidden" value="${window.currentUser?.name || ''}">
    <div style="font-size:10px;color:#aaa;margin-bottom:16px">${now}</div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button onclick="closeChangelogDialog()" style="padding:8px 16px;border:1px solid #ddd;border-radius:6px;background:#fff;font-size:13px;cursor:pointer">Avbryt</button>
      <button onclick="confirmChangelog()" style="padding:8px 16px;border:none;border-radius:6px;background:#2d5be3;color:#fff;font-size:13px;font-weight:600;cursor:pointer">Bekreft endring</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>document.getElementById('cl-comment').focus(),100);
}
function closeChangelogDialog(){const el=document.getElementById('cl-modal');if(el)el.remove();}
function confirmChangelog(){
  const{mcid,sn,i,newVal}=window._pc||{};
  if(mcid===undefined) return;
  const comment=document.getElementById('cl-comment').value.trim();
  const sign=document.getElementById('cl-sign').value.trim();
  if(!comment){document.getElementById('cl-comment').style.borderColor='#e74c3c';return;}
  if(!sign){ const s = window.currentUser?.name||''; if(!s){ alert('Ingen bruker innlogget'); return; } }
  const prev=state[mcid].sheets[sn].rows[i].avvik;
  if(!state[mcid].sheets[sn].rows[i].changelog) state[mcid].sheets[sn].rows[i].changelog=[];
  state[mcid].sheets[sn].rows[i].changelog.push({fra:prev,til:newVal,kommentar:comment,sign,tid:new Date().toLocaleString('no-NO')});
  state[mcid].sheets[sn].rows[i].avvik=newVal;
  closeChangelogDialog();
  save(); renderSheet(mcid,sn); buildSidebar();
  toast('Endring registrert i changelog');
}

// ── PDF EXPORT ──
function exportPDF(){
  if(!currentMC||!currentSheet){toast('Åpne en sjekkliste først');return;}
  const mcid=currentMC; const sn=currentSheet;
  const cfg=MC_CFG[mcid];
  const s=state[mcid]?.sheets[sn];
  const items=MC_DATA[mcid]?.[sn]?.items||[];
  const st=getSheetStats(mcid,sn);
  if(!s){return;}

  const rows=items.map((item,i)=>{
    const r=s.rows[i]||{};
    const av=r.na?'N/A':r.avvik==='ja'?'Ja':r.avvik==='nei'?'Nei':'';
    const bg=r.na?'#f5f5f5':r.avvik==='ja'?'#ffe0e0':r.avvik==='nei'?'#dcfce7':'#fff';
    return `<tr style="background:${bg}">
      <td style="text-align:center;color:#aaa;width:24px">${i+1}</td>
      <td style="font-weight:500">${item.element||''}</td>
      <td style="color:#666">${item.metode||''}</td>
      <td>${r.na?'<i>N/A</i>':(r.maal||'')}</td>

// ── BILDER ──
function imgGridId(mcid, sn) {
  return 'img-grid-' + mcid + '-' + sn.replace(/[^a-zA-Z0-9]/g,'-');
}

async function loadImages(mcid, sn) {
  const gridId = imgGridId(mcid, sn);
  const grid = document.getElementById(gridId);
  if (!grid) return;

  try {
    const key = encodeURIComponent(mcid + '/' + sn);
    const res = await fetch(WORKER + '/imagelist/' + mcid + '/' + encodeURIComponent(sn));
    const images = await res.json();

    if (!Array.isArray(images) || images.length === 0) {
      grid.innerHTML = '<div style="color:#aaa;font-size:13px;grid-column:1/-1">Ingen bilder lastet opp</div>';
      return;
    }

    grid.innerHTML = images.map(img => `
      <div class="img-thumb" onclick="openLightbox('${img.url}')">
        <img src="${img.url}" alt="bilde" loading="lazy">
        ${window.currentUser?.id === 'helge' ? `<button class="img-del" onclick="event.stopPropagation();deleteImage('${img.key}','${mcid}','${sn}')">✕</button>` : ''}
      </div>`).join('');
  } catch(e) {
    grid.innerHTML = '<div style="color:#c0392b;font-size:13px;grid-column:1/-1">Kunne ikke laste bilder</div>';
  }
}

function triggerImageUpload(mcid, sn) {
  const inputId = 'img-input-' + mcid + '-' + sn.replace(/[^a-zA-Z0-9]/g,'-');
  document.getElementById(inputId)?.click();
}

async function uploadImages(input, mcid, sn) {
  const files = Array.from(input.files);
  if (!files.length) return;

  const btn = input.previousElementSibling;
  btn.disabled = true;
  btn.textContent = 'Laster opp...';

  for (const file of files) {
    if (file.size > 10 * 1024 * 1024) {
      alert(file.name + ' er for stor (maks 10 MB)');
      continue;
    }
    // Compress image before upload
    const compressed = await compressImage(file, 1200, 0.8);
    const key = mcid + '/' + sn + '/' + Date.now() + '-' + file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    try {
      await fetch(WORKER + '/images/' + encodeURIComponent(key), {
        method: 'PUT',
        headers: { 'Content-Type': file.type || 'image/jpeg' },
        body: compressed
      });
    } catch(e) {
      alert('Feil ved opplasting av ' + file.name);
    }
  }

  btn.disabled = false;
  btn.textContent = '📎 Last opp bilde';
  input.value = '';
  await loadImages(mcid, sn);
}

function compressImage(file, maxPx, quality) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.width, h = img.height;
      if (w > maxPx || h > maxPx) {
        if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
    };
    img.src = url;
  });
}

async function deleteImage(key, mcid, sn) {
  if (!confirm('Slette dette bildet?')) return;
  try {
    await fetch(WORKER + '/images/' + encodeURIComponent(key), { method: 'DELETE' });
    await loadImages(mcid, sn);
  } catch(e) {
    alert('Kunne ikke slette bildet');
  }
}

function openLightbox(url) {
  const lb = document.createElement('div');
  lb.className = 'img-lightbox';
  lb.innerHTML = `<button class="img-lightbox-close" onclick="this.parentElement.remove()">×</button><img src="${url}">`;
  lb.addEventListener('click', e => { if(e.target === lb) lb.remove(); });
  document.body.appendChild(lb);
}

// ── INNLOGGING ──
const USERS = [
  { id:'helge',   name:'Helge Høgsand',     initials:'HH' },
  { id:'patrik',  name:'Patrik Gustavsson',  initials:'PG' },
  { id:'miguel',  name:'Miguel Pires',       initials:'MP' },
  { id:'hampus',  name:'Hampus',             initials:'H'  },
  { id:'test',    name:'Test',               initials:'T'  },
];

let loginState = { user:null, pin:'', step:'grid', confirmPin:'' };


// ── TIMEOUT & BRUKERBYTTE ──
let _timeoutTimer = null;
const TIMEOUT_MS = 5 * 60 * 1000; // 5 minutter

function resetTimeout() {
  clearTimeout(_timeoutTimer);
  _timeoutTimer = setTimeout(autoLogout, TIMEOUT_MS);
}

function autoLogout() {
  clearPresence();
  window.currentUser = null;
  document.getElementById('current-user-label').textContent = '';
  // Show login screen again
  const ls = document.getElementById('login-screen');
  ls.style.display = 'flex';
  // Reset pin modal
  document.getElementById('pin-modal').style.display = 'none';
  loginState.pin = '';
  loginState.step = 'grid';
  updatePinDots();
  toast('Logget ut automatisk etter 5 minutter');
}

function switchUser() {
  clearTimeout(_timeoutTimer);
  clearPresence();
  window.currentUser = null;
  document.getElementById('current-user-label').textContent = '';
  loginState.pin = '';
  loginState.step = 'grid';
  updatePinDots();
  document.getElementById('pin-modal').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function startSessionListeners() {
  ['mousemove','keydown','mousedown','touchstart','scroll'].forEach(ev => {
    document.addEventListener(ev, resetTimeout, { passive: true });
  });
  resetTimeout();
}

function initLogin() {
  const grid = document.getElementById('user-grid');
  grid.innerHTML = USERS.map(u => `
    <div class="user-card" onclick="selectUser('${u.id}')">
      <div class="user-avatar">${u.initials}</div>
      <div class="user-name">${u.name}</div>
    </div>`).join('');
}

function selectUser(userId) {
  const user = USERS.find(u => u.id === userId);
  loginState.user = user;
  loginState.pin = '';
  loginState.step = 'grid';

  document.getElementById('pin-avatar').textContent = user.initials;
  document.getElementById('pin-username').textContent = user.name;

  const hasPin = !!localStorage.getItem('pin_' + userId);
  if (hasPin) {
    loginState.step = 'enter';
    document.getElementById('pin-title').textContent = 'Skriv inn PIN';
    document.getElementById('pin-subtitle').textContent = '4 siffer';
  } else {
    loginState.step = 'create';
    document.getElementById('pin-title').textContent = 'Lag PIN-kode';
    document.getElementById('pin-subtitle').textContent = 'Velg 4 siffer';
  }

  updatePinDots();
  const modal = document.getElementById('pin-modal');
  modal.style.display = 'flex';
}

function showUserGrid() {
  document.getElementById('pin-modal').style.display = 'none';
  loginState.pin = '';
  loginState.step = 'grid';
  updatePinDots();
}

function pinKey(digit) {
  if (loginState.pin.length >= 4) return;
  loginState.pin += digit;
  updatePinDots();
  if (loginState.pin.length === 4) {
    setTimeout(processPin, 150);
  }
}

function pinDel() {
  loginState.pin = loginState.pin.slice(0, -1);
  updatePinDots();
}

function updatePinDots(error) {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('pd' + i);
    dot.className = 'pin-dot' + (i < loginState.pin.length ? (error ? ' error' : ' filled') : '');
  }
}

function processPin() {
  const { user, pin, step } = loginState;

  if (step === 'enter') {
    const stored = localStorage.getItem('pin_' + user.id);
    if (pin === stored) {
      window.currentUser = user;
      document.getElementById('current-user-label').textContent = user.name;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('pin-modal').style.display = 'none';
      startSessionListeners();
    } else {
      updatePinDots(true);
      document.getElementById('pin-subtitle').textContent = 'Feil PIN, prøv igjen';
      setTimeout(() => {
        loginState.pin = '';
        updatePinDots();
        document.getElementById('pin-subtitle').textContent = '4 siffer';
      }, 900);
    }

  } else if (step === 'create') {
    loginState.confirmPin = pin;
    loginState.pin = '';
    loginState.step = 'confirm';
    document.getElementById('pin-title').textContent = 'Bekreft PIN-kode';
    document.getElementById('pin-subtitle').textContent = 'Skriv inn PIN-en på nytt';
    updatePinDots();

  } else if (step === 'confirm') {
    if (pin === loginState.confirmPin) {
      localStorage.setItem('pin_' + user.id, pin);
      window.currentUser = user;
      document.getElementById('current-user-label').textContent = user.name;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('pin-modal').style.display = 'none';
      startSessionListeners();
    } else {
      updatePinDots(true);
      document.getElementById('pin-subtitle').textContent = 'PIN matcher ikke, start på nytt';
      setTimeout(() => {
        loginState.pin = '';
        loginState.confirmPin = '';
        loginState.step = 'create';
        document.getElementById('pin-title').textContent = 'Lag PIN-kode';
        document.getElementById('pin-subtitle').textContent = 'Velg 4 siffer';
        updatePinDots();
      }, 900);
    }
  }
}
